<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Paletas de Colores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1020;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitulo {
      color: #a3a3c2;
      font-size: 1rem;
      margin-bottom: 28px;
      text-align: center;
    }

    .paleta {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 820px;
      margin-bottom: 28px;
    }

    .color {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #1a1b32;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.12s ease;
    }

    .color:hover { transform: translateY(-4px); }

    .muestra {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.12);
    }

    .hex {
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      font-family: 'Consolas', monospace;
      user-select: all;
    }

    .copia-individual {
      margin-top: 4px;
      font-size: 0.72rem;
      color: #8a8aad;
    }

    .botones {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      font-size: 1.05rem;
      font-weight: 700;
      padding: 16px 28px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.15s ease;
    }

    button:hover { filter: brightness(1.12); }
    button:active { transform: scale(0.97); }

    .btn-generar {
      background: linear-gradient(135deg, #6d5efc, #48b1f3);
      color: #fff;
    }

    .btn-copiar {
      background: #f5f5f7;
      color: #0f1020;
    }

    .aviso {
      margin-top: 20px;
      min-height: 24px;
      font-size: 0.95rem;
      color: #7ee787;
      font-weight: 600;
    }

    footer {
      margin-top: 40px;
      color: #6b6b8a;
      font-size: 0.85rem;
      text-align: center;
    }

    @media (max-width: 640px) {
      .paleta { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <h1>🎨 Generador de Paletas de Colores</h1>
  <p class="subtitulo">Crea combinaciones de 5 colores al azar. Haz clic en un color para copiar su código.</p>

  <div class="paleta" id="paleta"></div>

  <div class="botones">
    <button class="btn-generar" id="btnGenerar">Generar nueva paleta</button>
    <button class="btn-copiar" id="btnCopiar">Copiar paleta</button>
  </div>

  <div class="aviso" id="aviso"></div>

  <footer>Consejo: presiona la barra espaciadora para generar otra paleta.</footer>

  <script>
    const paletaEl = document.getElementById('paleta');
    const avisoEl = document.getElementById('aviso');
    let coloresActuales = [];

    // Genera un color HEX aleatorio, ej: #A3F5C1
    function colorAleatorio() {
      const n = Math.floor(Math.random() * 0x1000000);
      return '#' + n.toString(16).padStart(6, '0').toUpperCase();
    }

    // Determina si el texto sobre el color debe ser claro u oscuro (contraste)
    function textoContraste(hex) {
      const r = parseInt(hex.substr(1, 2), 16);
      const g = parseInt(hex.substr(3, 2), 16);
      const b = parseInt(hex.substr(5, 2), 16);
      const luminancia = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminancia > 0.55 ? '#0f1020' : '#f5f5f7';
    }

    function mostrarAviso(texto) {
      avisoEl.textContent = texto;
      clearTimeout(mostrarAviso._t);
      mostrarAviso._t = setTimeout(() => { avisoEl.textContent = ''; }, 2500);
    }

    async function copiarTexto(texto, mensaje) {
      try {
        await navigator.clipboard.writeText(texto);
        mostrarAviso(mensaje);
      } catch (e) {
        // Respaldo por si el navegador bloquea la API del portapapeles
        const ta = document.createElement('textarea');
        ta.value = texto;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); mostrarAviso(mensaje); }
        catch (_) { mostrarAviso('No se pudo copiar automáticamente.'); }
        document.body.removeChild(ta);
      }
    }

    function generarPaleta() {
      coloresActuales = Array.from({ length: 5 }, colorAleatorio);
      paletaEl.innerHTML = '';
      coloresActuales.forEach(hex => {
        const cont = document.createElement('div');
        cont.className = 'color';
        cont.title = 'Clic para copiar ' + hex;

        const muestra = document.createElement('div');
        muestra.className = 'muestra';
        muestra.style.background = hex;

        const label = document.createElement('div');
        label.className = 'hex';
        label.textContent = hex;

        const mini = document.createElement('div');
        mini.className = 'copia-individual';
        mini.textContent = 'copiar';

        cont.appendChild(muestra);
        cont.appendChild(label);
        cont.appendChild(mini);
        cont.addEventListener('click', () => copiarTexto(hex, hex + ' copiado ✓'));
        paletaEl.appendChild(cont);
      });
    }

    document.getElementById('btnGenerar').addEventListener('click', generarPaleta);
    document.getElementById('btnCopiar').addEventListener('click', () => {
      copiarTexto(coloresActuales.join(', '), 'Paleta copiada al portapapeles ✓');
    });

    // Barra espaciadora = nueva paleta
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        generarPaleta();
      }
    });

    generarPaleta();
  </script>
</body>
</html>
